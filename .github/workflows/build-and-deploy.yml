name: Build, publish and deploy

# Builds the app + agent-sandbox + deploy-webhook images, pushes them to GHCR,
# then POSTs to the deploy-webhook receiver to roll the stack on Unraid. After
# this is set up, `git push` (or the "Run workflow" button) fully deploys — no
# manual SSH/git-pull/web-UI steps required.
#
# Required GitHub repository secrets (Settings -> Secrets and variables -> Actions):
#   WEBHOOK_URL        e.g. https://deploy.nicoolodion.com/deploy
#   WEBHOOK_SECRET     random string (same value as WEBHOOK_SECRET on Unraid)
#
# The packages are published to:
#   ghcr.io/nicoolodion/agentchat           (app)
#   ghcr.io/nicoolodion/agentchat-agent      (sandbox)
#   ghcr.io/nicoolodion/agentchat-webhook    (deploy receiver)

on:
  push:
    branches: [master]
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
  workflow_dispatch: {}

env:
  REGISTRY: ghcr.io
  # Parsed groups; image names live inline in the matrix below so GHCR's
  # lowercase requirement is visible next to each build definition.

jobs:
  build:
    name: Build & push ${{ matrix.image }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          # context is the build root; the Dockerfile is resolved as
          # {context}/Dockerfile for each (docker-sandbox has its own Dockerfile).
          - image: app
            context: .
            target: ghcr.io/nicoolodion/agentchat
          - image: sandbox
            context: docker-sandbox
            target: ghcr.io/nicoolodion/agentchat-agent
          - image: webhook
            context: deploy
            target: ghcr.io/nicoolodion/agentchat-webhook
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        # NOTE: building only linux/amd64 (Unraid). Add arm64 here and re-enable
        # QEMU below if you ever deploy to ARM.

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ matrix.target }}
          tags: |
            type=raw,value=latest
            type=sha,format=short

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  quality:
    name: Lint, typecheck & test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Lint
        run: npm run lint
        continue-on-error: true

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

  deploy:
    name: Trigger deploy webhook
    runs-on: ubuntu-latest
    needs: [build, quality]
    # Don't auto-deploy from dependabot/PR runs; only the real master branch.
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    steps:
      - name: Trigger deploy-webhook and (if supported) poll status
        env:
          WEBHOOK_URL: ${{ secrets.WEBHOOK_URL }}
          WEBHOOK_SECRET: ${{ secrets.WEBHOOK_SECRET }}
        run: |
          set -euo pipefail
          echo "Triggering $WEBHOOK_URL"

          # POST the deploy trigger. The receiver may respond either:
          #   - 202 Accepted + JSON {run_id}    -> new async receiver: poll status
          #   - 200 + full deploy output        -> old synchronous receiver: done
          #   - anything else                   -> error (print body, exit 1)
          code=$(curl -sS -o /tmp/body -w "%{http_code}" \
            -X POST \
            -H "X-Webhook-Secret: $WEBHOOK_SECRET" \
            -H "Content-Type: application/json" \
            --max-time 1200 \
            "$WEBHOOK_URL")
          echo "----- webhook response (HTTP $code) -----"
          cat /tmp/body; echo
          echo "-----------------------------------------"

          if [ "$code" = "200" ]; then
            echo "Synchronous receiver: deploy output above."
            exit 0
          fi

          if [ "$code" != "202" ]; then
            echo "Deploy trigger failed (HTTP $code)"
            exit 1
          fi

          # Async receiver: parse run_id and poll until finished.
          run_id=$(python3 -c "import json,sys; print(json.load(open('/tmp/body')).get('run_id',''))" 2>/dev/null || true)
          if [ -z "$run_id" ]; then
            echo "202 response had no run_id; cannot poll. Treating as success (check host logs)."
            exit 0
          fi
          echo "Deploy accepted as run $run_id — polling status..."

          # Overall poll budget must be under the webhook's DEPLOY_TIMEOUT
          # (default 1200s on the receiver).
          deadline=$(( $(date +%s) + 1150 ))
          last=""
          while [ "$(date +%s)" -lt "$deadline" ]; do
            sleep 5
            sjson=$(curl -sS --max-time 15 \
              -H "X-Webhook-Secret: $WEBHOOK_SECRET" \
              "$WEBHOOK_URL/status?run=$run_id" || echo '{}')
            status=$(python3 -c "import json,sys; print(json.load(sys.stdin).get('status',''))" <<<"$sjson" 2>/dev/null || echo "")
            echo "  status: $status"
            if [ "$status" != "running" ] && [ -n "$status" ]; then
              last="$sjson"
              break
            fi
          done

          echo "----- deploy log -----"
          curl -sS --max-time 15 \
            -H "X-Webhook-Secret: $WEBHOOK_SECRET" \
            "$WEBHOOK_URL/log?run=$run_id" || true
          echo
          echo "----------------------"

          if [ -z "$last" ]; then
            echo "Deploy timed out while polling status."
            exit 1
          fi
          final=$(python3 -c "import json,sys; print(json.load(sys.stdin).get('status',''))" <<<"$last" 2>/dev/null || echo "")
          if [ "$final" = "success" ]; then
            echo "Deploy succeeded."
            exit 0
          fi
          echo "Deploy did not succeed (final status: $final)."
          exit 1
