name: Build, publish and deploy

# Builds the app + agent-sandbox + deploy-webhook images, pushes them to GHCR,
# then POSTs to the deploy-webhook receiver to roll the stack on Unraid. After
# this is set up, `git push` (or the "Run workflow" button) fully deploys — no
# manual SSH/git-pull/web-UI steps required.
#
# Required GitHub repository secrets (Settings -> Secrets and variables -> Actions):
#   WEBHOOK_URL        e.g. https://deploy.nicoolodion.com/deploy
#   WEBHOOK_SECRET     random string (same value as WEBHOOK_SECRET on Unraid)
#
# The packages are published to:
#   ghcr.io/nicoolodion/agentchat           (app)
#   ghcr.io/nicoolodion/agentchat-agent      (sandbox)
#   ghcr.io/nicoolodion/agentchat-webhook    (deploy receiver)

on:
  push:
    branches: [master]
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
  workflow_dispatch: {}

env:
  REGISTRY: ghcr.io
  # Parsed groups; image names live inline in the matrix below so GHCR's
  # lowercase requirement is visible next to each build definition.

jobs:
  build:
    name: Build & push ${{ matrix.image }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          # context is the build root; the Dockerfile is resolved as
          # {context}/Dockerfile for each (docker-sandbox has its own Dockerfile).
          - image: app
            context: .
            target: ghcr.io/nicoolodion/agentchat
          - image: sandbox
            context: docker-sandbox
            target: ghcr.io/nicoolodion/agentchat-agent
          - image: webhook
            context: deploy
            target: ghcr.io/nicoolodion/agentchat-webhook
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        # NOTE: building only linux/amd64 (Unraid). Add arm64 here and re-enable
        # QEMU below if you ever deploy to ARM.

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ matrix.target }}
          tags: |
            type=raw,value=latest
            type=sha,format=short

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Trigger deploy webhook
    runs-on: ubuntu-latest
    needs: build
    # Don't auto-deploy from dependabot/PR runs; only the real master branch.
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    steps:
      - name: POST to deploy-webhook
        run: |
          set -euo pipefail
          echo "Triggering ${{ secrets.WEBHOOK_URL }}"
          code=$(curl -sS -o /tmp/body -w "%{http_code}" \
            -X POST \
            -H "X-Webhook-Secret: ${{ secrets.WEBHOOK_SECRET }}" \
            -H "Content-Type: application/json" \
            --max-time 1200 \
            "${{ secrets.WEBHOOK_URL }}")
          echo "----- webhook response (HTTP $code) -----"
          cat /tmp/body
          echo
          echo "-----------------------------------------"
          if [ "$code" != "200" ]; then
            echo "Deploy failed (HTTP $code)"
            exit 1
          fi
