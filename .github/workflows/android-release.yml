name: Android Release

on:
  push:
    tags:
      - "mobile-v*"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android-app
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: "platform-tools platforms;android-35 build-tools;35.0.0"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/libs.versions.toml') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Decode signing keystore
        if: ${{ github.ref_type == 'tag' && env.ANDROID_KEYSTORE != '' }}
        env:
          ANDROID_KEYSTORE: ${{ secrets.ANDROID_KEYSTORE }}
        run: |
          echo "$ANDROID_KEYSTORE" | base64 --decode > /tmp/agentchat.keystore
          echo "ANDROID_KEYSTORE_PATH=/tmp/agentchat.keystore" >> "$GITHUB_ENV"

      - name: Derive version from tag
        if: ${{ github.ref_type == 'tag' }}
        run: |
          # mobile-v1.2.3 -> VERSION_NAME=1.2.3, VERSION_CODE=10203
          VERSION_NAME="${GITHUB_REF_NAME#mobile-v}"
          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION_NAME"
          PATCH="${PATCH:-0}"
          VERSION_CODE=$((MAJOR * 10000 + MINOR * 100 + PATCH))
          echo "VERSION_NAME=$VERSION_NAME" >> "$GITHUB_ENV"
          echo "VERSION_CODE=$VERSION_CODE" >> "$GITHUB_ENV"

      - name: Build release APK
        env:
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          ANDROID_STORE_PASSWORD: ${{ secrets.ANDROID_STORE_PASSWORD }}
        run: gradle assembleRelease --no-daemon

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: agentchat-apk
          path: android-app/app/build/outputs/apk/release/app-release.apk
          if-no-files-found: warn

      - name: Create GitHub Release
        if: ${{ github.ref_type == 'tag' }}
        uses: softprops/action-gh-release@v2
        with:
          files: android-app/app/build/outputs/apk/release/app-release.apk
          generate_release_notes: true
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
