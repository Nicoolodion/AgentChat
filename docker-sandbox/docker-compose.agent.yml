# Docker Compose for Chatinterface Agent Sandbox (Development)
# Usage: docker compose -f docker-compose.agent.yml up -d

services:
  agent-sandbox:
    build:
      context: .
      dockerfile: Dockerfile
    image: chatinterface-agent:latest
    container_name: chatinterface-agent-sandbox
    ports:
      - "127.0.0.1:18080:8080"
    volumes:
      # Skills mount (read-only)
      - ../.kilo/skills:/app/skills:ro
      # Workspace volumes (persistent per session)
      - agent-workspaces:/workspace
    environment:
      - SANDBOX_LOG_LEVEL=info
      - SANDBOX_MAX_EXECUTION_TIME=300
      - SANDBOX_DEFAULT_TIMEOUT=60
    # Resource limits (mirror production constraints)
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
    read_only: true
    tmpfs:
      - /tmp:noexec,nosuid,size=100m
    networks:
      - agent-network
    restart: unless-stopped

volumes:
  agent-workspaces:
    driver: local

networks:
  agent-network:
    driver: bridge
