# Docker Compose for Chatinterface Agent Sandbox (Development)
# Usage: docker compose -f docker-compose.agent.yml up -d
#
# DESIGN: one shared sandbox container, session isolation via directories.
# Each session gets a host bind-mount so data survives container restarts
# and is easy to back up / inspect.

services:
  agent-sandbox:
    build:
      context: .
      dockerfile: Dockerfile
    image: chatinterface-agent:latest
    container_name: chatinterface-agent-sandbox
    pull_policy: never
    ports:
      - "127.0.0.1:18080:8080"
    volumes:
      # Live mount of sandbox server code so edits are reflected without rebuild
      - ./app/lib:/app/lib:ro
      - ./app/scripts:/app/scripts:ro
      # Skills mount (read-only) — mounted from the project root skills/
      - ../skills:/app/skills:ro
      # Agent workspaces (bind-mounted host directories)
      # The Next.js backend creates per-session folders under this path.
      # One session cannot read another's data because the backend only
      # ever resolves paths inside the specific session directory.
      - ../data/agent-workspaces:/workspace
      # OCR engine: llama.cpp binary + PaddleOCR-VL-1.6 GGUF models (persistent,
      # writable; downloads only once on first start).
      - ../data/agent-models:/models
    environment:
      - SANDBOX_LOG_LEVEL=info
      - SANDBOX_MAX_EXECUTION_TIME=300
      - SANDBOX_DEFAULT_TIMEOUT=60
      - TMPDIR=/tmp
      # OCR / llama.cpp tuning (CPU-only).
      - LLAMA_THREADS=4
      - LLAMA_CTX=8192
      - LLAMA_PORT=8181
      - OCR_PDF_DPI=200
      - OCR_MAX_PAGES=15
    # Resource limits (mirror production constraints)
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 4G
    security_opt:
      - no-new-privileges:true
    # Read-only root filesystem: only the code bind mounts (already :ro), the
    # session workspace, /models (OCR models), and /tmp (tmpfs) are writable.
    # Session code cannot patch /app or drop backdoors into the container image.
    read_only: true
    tmpfs:
      - /tmp:rw,nosuid,nodev,size=536870912,mode=1777
      - /run:rw,nosuid,nodev,size=67108864,mode=0755
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
      - FOWNER
      - DAC_OVERRIDE
    sysctls:
      - net.ipv4.ip_unprivileged_port_start=1024
    networks:
      - agent-network
    restart: unless-stopped

networks:
  agent-network:
    driver: bridge
