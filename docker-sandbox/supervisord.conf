[supervisord]
nodaemon=true
user=sandbox
logfile=/tmp/supervisord.log
pidfile=/tmp/supervisord.pid

[program:sandbox-api]
command=python /app/lib/sandbox_server.py --port 8080 --host 0.0.0.0
autostart=true
autorestart=true
stderr_logfile=/tmp/sandbox-api.err.log
stdout_logfile=/tmp/sandbox-api.out.log
environment=PYTHONUNBUFFERED=1
