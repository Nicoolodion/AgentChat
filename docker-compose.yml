# docker-compose.yml — Production
#
# A small two-service deployment of Chatinterface for Unraid (or any host
# running Docker Compose v2+). Expose only port 3000 to your reverse proxy.
#
# Images are built by GitHub Actions and published to GHCR, so the host only
# pulls prebuilt images (no local build needed -> fast updates, low host load).
#
# First-time setup:
#   cp .env.example .env   # then edit secrets (incl. HOST_DEPLOY_PATH + WEBHOOK_SECRET)
#   docker compose --profile full up -d   # creates & starts everything
#
# Update (manual: pull prebuilt images + recreate):
#   docker compose --profile full pull && docker compose --profile full up -d
# Update (automatic): push to master -> GitHub Actions builds + pushes images
#   -> POSTs to deploy-webhook -> deploy.sh pulls + recreates app/sandbox.
#
# The companion agent sandbox lives in docker-sandbox/ and is built from its
# own Dockerfile by the same CI workflow. The deploy webhook receiver lives in
# deploy/ and is built from deploy/Dockerfile.

# Lowercase repo owner is required by GHCR.
# App:     ghcr.io/nicoolodion/agentchat
# Sandbox: ghcr.io/nicoolodion/agentchat-agent
# Webhook: ghcr.io/nicoolodion/agentchat-webhook

services:
  app:
    image: ghcr.io/nicoolodion/agentchat:latest
    container_name: chatinterface-app
    restart: unless-stopped
    pull_policy: always
    env_file: .env
    environment:
      NODE_ENV: production
      HOSTNAME: 0.0.0.0
      PORT: 3000
      DATABASE_URL: file:/app/data/chatinterface.db
    ports:
      - "3000:3000"
    networks:
      - app-net
    volumes:
      # Persist DB + encrypted user files + agent workspaces on the host
      - ./data:/app/data
    # A dedicated GET /api/health route returning 200 unauthenticated is the
    # recommended probe; it does not exist yet, so treat any HTTP response < 500
    # (the 401 from /api/auth/me proves the server is up) as healthy.
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/api/auth/me').then(r=>process.exit(r.status<500?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    # Better-sqlite3 + the agent's heavy I/O benefits from extra shared mem
    shm_size: 512mb

  # Optional: only enable if you want the full agent sandbox on the same host.
  # The app will still start without it; agent features will report "sandbox offline".
  agent-sandbox:
    image: ghcr.io/nicoolodion/agentchat-agent:latest
    container_name: chatinterface-agent-sandbox
    restart: unless-stopped
    pull_policy: always
    profiles: ["full"]   # start with: docker compose --profile full up -d
    ports:
      - "18080:8080"
    networks:
      - app-net
    volumes:
      - ./skills:/app/skills:ro
      - ./data/agent-workspaces:/workspace
      # OCR engine: llama.cpp binary + PaddleOCR-VL-1.6 GGUF models. Persisted so
      # the multi-GB models download only once (on first start). Must be writable
      # (the rootfs is read-only).
      - ./data/agent-models:/models
    environment:
      - SANDBOX_LOG_LEVEL=info
      - SANDBOX_MAX_EXECUTION_TIME=300
      # OCR / llama.cpp tuning (CPU-only; the host is an i5-9500T, no GPU).
      - LLAMA_THREADS=4
      - LLAMA_CTX=8192
      - LLAMA_PORT=8181
      - OCR_PDF_DPI=200
      - OCR_MAX_PAGES=15
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 4G
    security_opt:
      - no-new-privileges:true
    # Read-only root filesystem: only /workspace (bind mount), /models (bind
    # mount for OCR models), and /tmp (tmpfs) are writable. Session code
    # therefore cannot patch /app, write to /etc, or drop backdoors into the
    # container image (audit finding 2.2).
    read_only: true
    tmpfs:
      - /tmp:rw,nosuid,nodev,size=536870912,mode=1777
      - /run:rw,nosuid,nodev,size=67108864,mode=0755
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
      - FOWNER
      - DAC_OVERRIDE
    # Prevent unprivileged users from binding low (<1024) ports (audit 2.4).
    sysctls:
      - net.ipv4.ip_unprivileged_port_start=1024

  # Deploy webhook receiver. Listens on 127.0.0.1:9000; expose it via your
  # reverse proxy (e.g. deploy.<your-domain> -> 127.0.0.1:9000). GitHub Actions
  # posts to /deploy with header X-Webhook-Secret; the container validates it,
  # then runs deploy.sh which pulls new images and recreates app + sandbox.
  # No profile -> always starts with `docker compose up -d`.
  deploy-webhook:
    image: ghcr.io/nicoolodion/agentchat-webhook:latest
    container_name: chatinterface-deploy-webhook
    restart: unless-stopped
    pull_policy: always
    ports:
      - "9000:9000"
    networks:
      - app-net
    # Same-path bind so docker compose (run inside, against host daemon)
    # resolves relative volume binds correctly. Must be the absolute host
    # path that contains this docker-compose.yml. Mounted read-only (C10):
    # deploy.sh tolerates this and still pulls/recreates images; update
    # docker-compose.yml itself with a manual host `git pull`.
    volumes:
      - ${HOST_DEPLOY_PATH}:${HOST_DEPLOY_PATH}:ro
      - /var/run/docker.sock:/var/run/docker.sock
      # Persist deploy run logs + status JSON across webhook container
      # restarts. Defaults to ./data/deploy-logs inside the host checkout.
      # This is the only writable host path mounted into the container.
      - ./data/deploy-logs:/app/logs
    environment:
      - WEBHOOK_SECRET=${WEBHOOK_SECRET}
      - HOST_DEPLOY_PATH=${HOST_DEPLOY_PATH}
      - PORT=9000
      - DEPLOY_LOG_DIR=/app/logs
    # Hardening (C10): the webhook runs git + docker compose (plain socket I/O
    # + file ops) as root, so it needs minimal capabilities. DAC_OVERRIDE is
    # required because the deploy-logs bind may be owned by a non-root UID
    # (Unraid's nobody/users). The Docker socket is a far larger trust boundary
    # than this file-write capability.
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - DAC_OVERRIDE
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:9000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"

  # ntfy (self-hosted, UnifiedPush-compatible) push server. The Android app
  # subscribes to its per-user topic; the app POSTs to it on task completion.
  # Upstream official image — no custom build needed. Behind your reverse
  # proxy at e.g. ntfy.<your-domain>. Runs under the "full" profile like the
  # sandbox so a lightweight app-only deploy omits it.
  ntfy:
    image: binwiederhier/ntfy:latest
    container_name: chatinterface-ntfy
    restart: unless-stopped
    command: serve
    profiles: ["full"]
    ports:
      - "8090:80"
    networks:
      - app-net
    volumes:
      - ./data/ntfy:/var/lib/ntfy
      - ./deploy/ntfy.yml:/etc/ntfy/server.yml:ro
    environment:
      - NTFY_BASE_URL=${NTFY_BASE_URL}
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:80/v1/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"

networks:
  app-net:
    driver: bridge