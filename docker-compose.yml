# docker-compose.yml — Production
#
# A small two-service deployment of Chatinterface for Unraid (or any host
# running Docker Compose v2+). Expose only port 3000 to your reverse proxy.
#
# Images are built by GitHub Actions and published to GHCR, so the host only
# pulls prebuilt images (no local build needed -> fast updates, low host load).
#
# First-time setup:
#   cp .env.example .env   # then edit secrets (incl. HOST_DEPLOY_PATH + WEBHOOK_SECRET)
#   docker compose --profile full up -d   # creates & starts everything
#
# Update (manual: pull prebuilt images + recreate):
#   docker compose --profile full pull && docker compose --profile full up -d
# Update (automatic): push to master -> GitHub Actions builds + pushes images
#   -> POSTs to deploy-webhook -> deploy.sh pulls + recreates app/sandbox.
#
# The companion agent sandbox lives in docker-sandbox/ and is built from its
# own Dockerfile by the same CI workflow. The deploy webhook receiver lives in
# deploy/ and is built from deploy/Dockerfile.

# Lowercase repo owner is required by GHCR.
# App:     ghcr.io/nicoolodion/agentchat
# Sandbox: ghcr.io/nicoolodion/agentchat-agent
# Webhook: ghcr.io/nicoolodion/agentchat-webhook

services:
  app:
    image: ghcr.io/nicoolodion/agentchat:latest
    container_name: chatinterface-app
    restart: unless-stopped
    pull_policy: always
    env_file: .env
    environment:
      NODE_ENV: production
      HOSTNAME: 0.0.0.0
      PORT: 3000
      DATABASE_URL: file:/app/data/chatinterface.db
    ports:
      - "3000:3000"
    networks:
      - app-net
    volumes:
      # Persist DB + encrypted user files + agent workspaces on the host
      - ./data:/app/data
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/api/auth/me').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    # Better-sqlite3 + the agent's heavy I/O benefits from extra shared mem
    shm_size: 512mb

  # Optional: only enable if you want the full agent sandbox on the same host.
  # The app will still start without it; agent features will report "sandbox offline".
  agent-sandbox:
    image: ghcr.io/nicoolodion/agentchat-agent:latest
    container_name: chatinterface-agent-sandbox
    restart: unless-stopped
    pull_policy: always
    profiles: ["full"]   # start with: docker compose --profile full up -d
    ports:
      - "18080:8080"
    networks:
      - app-net
    volumes:
      - ./skills:/app/skills:ro
      - ./data/agent-workspaces:/workspace
    environment:
      - SANDBOX_LOG_LEVEL=info
      - SANDBOX_MAX_EXECUTION_TIME=300
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID

  # Deploy webhook receiver. Listens on 127.0.0.1:9000; expose it via your
  # reverse proxy (e.g. deploy.<your-domain> -> 127.0.0.1:9000). GitHub Actions
  # posts to /deploy with header X-Webhook-Secret; the container validates it,
  # then runs deploy.sh which pulls new images and recreates app + sandbox.
  # No profile -> always starts with `docker compose up -d`.
  deploy-webhook:
    image: ghcr.io/nicoolodion/agentchat-webhook:latest
    container_name: chatinterface-deploy-webhook
    restart: unless-stopped
    pull_policy: always
    ports:
      - "127.0.0.1:9000:9000"
    # Same-path bind so docker compose (run inside, against host daemon)
    # resolves relative volume binds correctly. Must be the absolute host
    # path that contains this docker-compose.yml.
    volumes:
      - ${HOST_DEPLOY_PATH}:${HOST_DEPLOY_PATH}
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - WEBHOOK_SECRET=${WEBHOOK_SECRET}
      - HOST_DEPLOY_PATH=${HOST_DEPLOY_PATH}
      - PORT=9000
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"

networks:
  app-net:
    driver: bridge